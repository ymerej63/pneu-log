<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SUIVI DES PNEUS</title>
<meta name="theme-color" content="#121417">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pneus">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@2/dist/iife/reader/index.js"></script>
<style>
  :root{
    --asphalt:#121417;
    --asphalt-2:#1b1e23;
    --asphalt-3:#24282f;
    --chalk:#EDEAE3;
    --chalk-dim:#9AA0A8;
    --flag:#FF5A1F;
    --flag-dim:#7a2c11;
    --amber:#FFB020;
    --line:#2e333b;
    --good:#4CAF7D;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--asphalt);color:var(--chalk);font-family:'Inter',sans-serif;overscroll-behavior:none;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}

  .tread{
    height:6px;width:100%;flex-shrink:0;
    background:repeating-linear-gradient(115deg,var(--flag) 0 8px,transparent 8px 16px);
    opacity:.85;
  }

  header{
    padding:18px 18px 14px;display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--line);background:var(--asphalt);
    position:sticky;top:0;z-index:5;
  }
  header .back{
    width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
    background:var(--asphalt-2);display:flex;align-items:center;justify-content:center;
    color:var(--chalk);cursor:pointer;flex-shrink:0;
  }
  header .header-delete{
    width:34px;height:34px;border-radius:8px;border:1px solid #4a2420;
    background:var(--asphalt-2);display:flex;align-items:center;justify-content:center;
    color:#FF6B5A;cursor:pointer;flex-shrink:0;font-size:16px;
  }
  header h1{
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.5px;
    font-size:20px;font-weight:600;margin:0;flex:1;
  }
  header .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--chalk-dim);margin-top:2px;}

  main{flex:1;padding:16px;padding-bottom:100px;}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;
    font-weight:600;font-size:15px;border:none;border-radius:10px;padding:14px 18px;
    cursor:pointer;width:100%;
  }
  .btn-primary{background:var(--flag);color:#161616;}
  .btn-primary:active{background:#e04f19;}
  .btn-ghost{background:transparent;color:var(--chalk);border:1px solid var(--line);}
  .btn-ghost:active{background:var(--asphalt-2);}
  .btn-sm{padding:9px 14px;font-size:12px;width:auto;}

  .fab{
    position:fixed;bottom:calc(22px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);
    max-width:488px;width:calc(100% - 32px);z-index:6;
    box-shadow:0 8px 24px rgba(255,90,31,.35);
  }

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{
    font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 12px;border-radius:20px;
    border:1px solid var(--line);color:var(--chalk-dim);cursor:pointer;background:var(--asphalt-2);
  }
  .chip.active{background:var(--flag);border-color:var(--flag);color:#161616;font-weight:600;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--chalk-dim);
  }
  .empty svg{opacity:.5;margin-bottom:14px;}
  .empty p{font-size:14px;line-height:1.5;max-width:260px;margin:0 auto;}

  .card{
    background:var(--asphalt-2);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;
  }
  .card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--pos-color,var(--flag));
  }
  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .card-id{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;letter-spacing:.5px;}
  .pos-badge{
    font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;
    padding:3px 8px;border-radius:5px;background:var(--asphalt-3);color:var(--pos-color,var(--flag));
  }
  .card-meta{display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--chalk-dim);}
  .card-meta b{color:var(--chalk);font-weight:500;}

  /* Scanner */
  .scan-wrap{position:fixed;inset:0;background:#000;z-index:20;display:flex;flex-direction:column;}
  .scan-header{
    position:absolute;top:0;left:0;right:0;z-index:2;
    display:flex;align-items:center;gap:12px;padding:16px;
    background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
  }
  #scanner-container{position:absolute;inset:0;overflow:hidden;background:#000;}
  #scanner-container video, #scanner-container canvas{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    min-width:100%;min-height:100%;width:auto;height:auto;
  }
  #scanner-container canvas.drawingBuffer{display:none;}
  .viewfinder{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:78%;max-width:340px;height:150px;pointer-events:none;
  }
  .vf-corner{position:absolute;width:26px;height:26px;border:3px solid var(--flag);}
  .vf-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:4px 0 0 0;}
  .vf-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 4px 0 0;}
  .vf-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 4px;}
  .vf-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 4px 0;}
  .scan-hint{
    position:absolute;bottom:0;left:0;right:0;padding:24px 20px 34px;
    background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);
    text-align:center;z-index:2;
  }
  .scan-hint p{color:var(--chalk);font-size:13px;margin:0 0 14px;font-family:'IBM Plex Mono',monospace;}
  .manual-toggle{color:var(--flag);font-size:13px;text-decoration:underline;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;}

  .manual-sheet{
    position:absolute;bottom:0;left:0;right:0;background:var(--asphalt-2);
    border-radius:16px 16px 0 0;padding:20px;z-index:3;border-top:1px solid var(--line);
  }

  /* Form */
  label{display:block;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.8px;
    text-transform:uppercase;color:var(--chalk-dim);margin:16px 0 6px;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=date],input[type=number],textarea,select{
    width:100%;background:var(--asphalt-2);border:1px solid var(--line);border-radius:9px;
    padding:12px 13px;color:var(--chalk);font-size:15px;font-family:'Inter',sans-serif;
  }
  input[type=number]{font-family:'IBM Plex Mono',monospace;}
  textarea{min-height:64px;resize:vertical;font-family:'Inter',sans-serif;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-sheet{padding-bottom:20px;}
  .form-actions{display:flex;gap:10px;margin-top:22px;}

  /* Tire detail */
  .stat-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat{flex:1;background:var(--asphalt-2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;}
  .stat b{display:block;font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--flag);}
  .stat span{font-size:10px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.6px;}

  .session{border-left:2px solid var(--line);padding:2px 0 14px 16px;position:relative;cursor:pointer;}
  .session::before{content:'';position:absolute;left:-5px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--flag);}
  .session .s-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--chalk-dim);display:flex;justify-content:space-between;align-items:center;}
  .session .s-chevron{transition:transform .2s;font-size:13px;}
  .session.open .s-chevron{transform:rotate(180deg);}
  .session .s-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;margin:2px 0 0;}
  .session .s-detail{display:none;margin-top:8px;}
  .session.open .s-detail{display:block;}
  .session .s-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-size:13px;color:var(--chalk-dim);margin-bottom:6px;}
  .session .s-grid b{color:var(--chalk);font-weight:500;}
  .session .s-note{font-size:13px;color:var(--chalk-dim);line-height:1.4;}
  .session .s-note b{color:var(--chalk);font-weight:500;}
  .s-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
  .s-action-btn{
    font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.5px;text-transform:uppercase;
    font-weight:600;background:var(--asphalt-3);border:1px solid var(--line);color:var(--chalk-dim);
    padding:7px 12px;border-radius:7px;cursor:pointer;
  }
  .s-action-delete{color:#FF6B5A;border-color:#4a2420;}

  /* Data sheet (export / import) */
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:15;}
  .home-sheet{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    max-width:520px;width:100%;background:var(--asphalt-2);
    border-radius:16px 16px 0 0;border-top:1px solid var(--line);
    padding:20px 20px calc(22px + env(safe-area-inset-bottom,0px));z-index:16;
  }
  .home-sheet h2{
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;
    font-size:15px;font-weight:600;margin:0 0 14px;
  }
  .home-sheet .btn{margin-bottom:10px;}
  .home-sheet .hint{font-size:12px;color:var(--chalk-dim);line-height:1.45;margin:4px 0 14px;}

  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--asphalt-3);border:1px solid var(--line);padding:10px 18px;border-radius:20px;
    font-size:13px;z-index:30;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div class="tread"></div>
  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const POSITIONS = [
  {id:'AVD', label:'AV. DROIT', color:'#FF5A1F'},
  {id:'AVG', label:'AV. GAUCHE', color:'#FFB020'},
  {id:'ARD', label:'AR. DROIT', color:'#4CAF7D'},
  {id:'ARG', label:'AR. GAUCHE', color:'#4C9AFF'},
];
const SESSION_TYPES = ['EL1','EL2','C1','C2','C3','C4'];

let state = { view: 'home', tireKey: null, filterPos: null, quaggaRunning: false };

function posInfo(id){ return POSITIONS.find(p=>p.id===id) || {label:id||'—', color:'#FF5A1F'}; }
function sanitizeKey(raw){ return ('t_'+raw).replace(/[^a-zA-Z0-9_.:-]/g,'_').slice(0,190); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML;
}

// ---------- Service worker (offline) ----------
if('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW registration failed', e));
  });
}

// ---------- Beep ----------
let audioCtx = null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){ /* audio unavailable, ignore */ }
}
function playBeep(){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 1800;
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.2, audioCtx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.13);
  }catch(e){}
}

// ---------- Storage ----------
const STORE_PREFIX = 'pneu-log:';
async function getIndex(){
  try{
    const raw = localStorage.getItem(STORE_PREFIX+'tire-index');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
async function saveIndex(list){
  try{ localStorage.setItem(STORE_PREFIX+'tire-index', JSON.stringify(list)); }
  catch(e){ console.error('index save failed', e); }
}
async function getTire(key){
  try{
    const raw = localStorage.getItem(STORE_PREFIX+key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function saveTire(key, tire){
  try{ localStorage.setItem(STORE_PREFIX+key, JSON.stringify(tire)); return true; }
  catch(e){ console.error('tire save failed', e); return false; }
}
async function deleteTire(key){
  try{ localStorage.removeItem(STORE_PREFIX+key); }catch(e){}
  const idx = await getIndex();
  await saveIndex(idx.filter(k=>k!==key));
}
async function findOrCreateTire(rawId){
  const key = sanitizeKey(rawId);
  let tire = await getTire(key);
  let isNew = false;
  if(!tire){
    tire = { id: rawId, key, position: null, createdAt: Date.now(), sessions: [] };
    isNew = true;
    const idx = await getIndex();
    if(!idx.includes(key)){ idx.push(key); await saveIndex(idx); }
    await saveTire(key, tire);
  }
  return { tire, isNew };
}

// ---------- Export / Import ----------
async function getAllTires(){
  const idx = await getIndex();
  return (await Promise.all(idx.map(getTire))).filter(Boolean);
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
async function exportJSON(){
  const tires = await getAllTires();
  if(tires.length===0){ showToast('Aucune donnée à exporter'); return; }
  const payload = { app:'suivi-pneus', version:1, exportedAt:new Date().toISOString(), tires };
  downloadBlob(new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'}), `suivi-pneus-${todayStr()}.json`);
  showToast('Export JSON généré');
}
function csvCell(v){
  const s = String(v ?? '');
  return /[";\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
async function exportCSV(){
  const tires = await getAllTires();
  if(tires.length===0){ showToast('Aucune donnée à exporter'); return; }
  const header = ['pneu','position','date','lieu','session','tours','km','pression_froid_bar','pression_chaud_bar','temp_pneu_c','reglages','usure'];
  const rows = [header.join(';')];
  tires.forEach(t=>{
    if(t.sessions.length===0){
      rows.push([t.id, t.position||'', '', '', '', '', '', '', '', '', '', ''].map(csvCell).join(';'));
    }
    t.sessions.forEach(s=>{
      rows.push([t.id, s.position||t.position||'', s.date, s.location, s.sessionType, s.laps, s.km,
        s.pressureCold, s.pressureHot, s.temp, s.setup, s.wear].map(csvCell).join(';'));
    });
  });
  // BOM pour qu'Excel FR reconnaisse l'UTF-8
  downloadBlob(new Blob(['\ufeff'+rows.join('\r\n')], {type:'text/csv;charset=utf-8'}), `suivi-pneus-${todayStr()}.csv`);
  showToast('Export CSV généré');
}
function importJSON(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json,application/json';
  inp.onchange = async () => {
    const file = inp.files && inp.files[0];
    if(!file) return;
    try{
      const data = JSON.parse(await file.text());
      const list = Array.isArray(data) ? data : data.tires;
      if(!Array.isArray(list)) throw new Error('format');
      let added = 0, merged = 0;
      for(const imp of list){
        if(!imp || !imp.id) continue;
        const key = imp.key || sanitizeKey(imp.id);
        const existing = await getTire(key);
        if(existing){
          const known = new Set(existing.sessions.map(s=>s.id));
          const news = (imp.sessions||[]).filter(s=>!known.has(s.id));
          if(news.length){
            existing.sessions = existing.sessions.concat(news)
              .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || (a.id-b.id));
            merged += news.length;
          }
          if(!existing.position && imp.position) existing.position = imp.position;
          await saveTire(key, existing);
        } else {
          await saveTire(key, { id: imp.id, key, position: imp.position||null,
            createdAt: imp.createdAt||Date.now(), sessions: imp.sessions||[] });
          const idx = await getIndex();
          if(!idx.includes(key)){ idx.push(key); await saveIndex(idx); }
          added++;
        }
      }
      showToast(`Import : ${added} pneu${added>1?'s':''}, ${merged} roulage${merged>1?'s':''} ajoutés`);
      go('home');
    }catch(e){
      console.error(e);
      showToast('Fichier invalide — export JSON attendu');
    }
  };
  inp.click();
}
function showDataSheet(){
  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  const sheet = document.createElement('div');
  sheet.className = 'home-sheet';
  sheet.innerHTML = `
    <h2>Sauvegarde des données</h2>
    <div class="hint">Les données vivent dans le navigateur : pense à exporter après chaque week-end de course. Le JSON sert de sauvegarde/restauration, le CSV pour l'analyse (Excel, etc.).</div>
    <button class="btn btn-primary" id="ds-json">⤓ &nbsp;Exporter la sauvegarde (JSON)</button>
    <button class="btn btn-ghost" id="ds-csv">⤓ &nbsp;Exporter pour analyse (CSV)</button>
    <button class="btn btn-ghost" id="ds-import">⤒ &nbsp;Importer une sauvegarde</button>
    <button class="btn btn-ghost" id="ds-close">Fermer</button>
  `;
  const close = ()=>{ backdrop.remove(); sheet.remove(); };
  backdrop.onclick = close;
  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  document.getElementById('ds-json').onclick = ()=>{ exportJSON(); };
  document.getElementById('ds-csv').onclick = ()=>{ exportCSV(); };
  document.getElementById('ds-import').onclick = ()=>{ close(); importJSON(); };
  document.getElementById('ds-close').onclick = close;
}

// ---------- Router ----------
function render(){
  stopCamera();
  const v = document.getElementById('view');
  if(state.view==='home') return renderHome(v);
  if(state.view==='scan') return renderScan(v);
  if(state.view==='detail') return renderDetail(v);
  if(state.view==='form') return renderForm(v);
}
function go(view, opts={}){ state = {...state, ...opts, view}; render(); }

// ---------- Home ----------
async function renderHome(v){
  v.innerHTML = `
    <header>
      <div style="flex:1;">
        <h1>Suivi des Pneus</h1>
        <div class="sub">${APP_VERSION} · scanner FIA</div>
      </div>
      <button class="back" id="data-btn" title="Sauvegarde / export">⇅</button>
    </header>
    <main id="home-main"><p style="color:var(--chalk-dim);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p></main>
    <button class="btn btn-primary fab" id="scan-fab">＋ &nbsp;Scanner un pneu</button>
  `;
  document.getElementById('scan-fab').onclick = () => go('scan');
  document.getElementById('data-btn').onclick = showDataSheet;

  const idx = await getIndex();
  const tires = (await Promise.all(idx.map(getTire))).filter(Boolean);
  tires.sort((a,b)=>{
    const la = a.sessions.length ? a.sessions[a.sessions.length-1].date : '';
    const lb = b.sessions.length ? b.sessions[b.sessions.length-1].date : '';
    return lb.localeCompare(la);
  });

  const main = document.getElementById('home-main');
  const filtered = state.filterPos ? tires.filter(t=>t.position===state.filterPos) : tires;

  if(tires.length===0){
    main.innerHTML = `
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M21 12h-3M6 12H3"/></svg>
        <p>Aucun pneu enregistré pour l'instant. Scanne le code-barres d'un pneu pour commencer son historique de roulage.</p>
      </div>`;
    return;
  }

  const chips = ['<button class="chip '+(!state.filterPos?'active':'')+'" data-p="">TOUS</button>']
    .concat(POSITIONS.map(p=>`<button class="chip ${state.filterPos===p.id?'active':''}" data-p="${p.id}" style="${state.filterPos===p.id?`background:${p.color};border-color:${p.color}`:''}">${p.label}</button>`));

  main.innerHTML = `<div class="chips">${chips.join('')}</div><div id="cards"></div>`;
  main.querySelectorAll('.chip').forEach(c=>{
    c.onclick = () => go('home', {filterPos: c.dataset.p || null});
  });

  const cards = document.getElementById('cards');
  if(filtered.length===0){
    cards.innerHTML = `<div class="empty"><p>Aucun pneu sur cette position.</p></div>`;
    return;
  }
  cards.innerHTML = filtered.map(t=>{
    const info = posInfo(t.position);
    const last = t.sessions[t.sessions.length-1];
    return `
      <div class="card" style="--pos-color:${info.color}" data-key="${t.key}">
        <div class="card-top">
          <span class="card-id">${escapeHtml(t.id)}</span>
          <span class="pos-badge" style="--pos-color:${info.color}">${info.label}</span>
        </div>
        <div class="card-meta">
          <span><b>${t.sessions.length}</b> roulage${t.sessions.length>1?'s':''}</span>
          ${last? `<span>dernier : <b>${fmtDate(last.date)}</b></span>` : ''}
        </div>
      </div>`;
  }).join('');
  cards.querySelectorAll('.card').forEach(c=>{
    c.onclick = () => go('detail', {tireKey: c.dataset.key});
  });
}

// ---------- Décodeur FIA-ITF spécialisé ----------
// Les étiquettes FIA sont en Interleaved 2 of 5, 8 chiffres, souvent usées/craquelées.
// Les librairies génériques lisent ligne par ligne : chaque fissure casse la lecture.
// Ici : détection de l'étiquette jaune, redressement, puis MOYENNE VERTICALE des
// barres (répare les fissures) avant décodage. Validé sur photos réelles.
const ITF_PAT = {'NNWWN':'0','WNNNW':'1','NWNNW':'2','WWNNN':'3','NNWNW':'4',
                 'WNWNN':'5','NWWNN':'6','NNNWW':'7','WNNWN':'8','NWNWN':'9'};

function median(arr){
  const s = arr.slice().sort((a,b) => a-b);
  const m = s.length >> 1;
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}

function itfRunsFromProfile(profile){
  const n = profile.length;
  const k = Math.max(31, Math.round(n / 9) | 1);
  const half = k >> 1;
  const cum = new Float64Array(n + 1);
  for(let i = 0; i < n; i++) cum[i+1] = cum[i] + profile[i];
  const runs = [];
  let cur = -1, count = 0;
  for(let i = 0; i < n; i++){
    const a = Math.max(0, i - half), b = Math.min(n, i + half + 1);
    const base = (cum[b] - cum[a]) / (b - a);
    const v = profile[i] < base - 6 ? 1 : 0;
    if(v === cur) count++;
    else { if(cur >= 0) runs.push([cur, count]); cur = v; count = 1; }
  }
  runs.push([cur, count]);
  return runs;
}

function itfDecodeRuns(runs){
  runs = runs.slice();
  while(runs.length && runs[0][0] === 0) runs.shift();
  while(runs.length && runs[runs.length-1][0] === 0) runs.pop();
  if(runs.length < 47) return null;
  for(let start = 0; start + 47 <= runs.length; start++){
    const seg = runs.slice(start, start + 47);
    if(seg[0][0] !== 1) continue;
    const widths = seg.map(r => r[1]);
    const narrow = median(widths.slice().sort((a,b) => a-b).slice(0, 20));
    if(narrow < 1.6) continue;
    const cls = widths.map(w => {
      const r = w / narrow;
      if(r < 1.8) return 'N';
      if(r < 4.5) return 'W';
      return '?';
    });
    // start : barre,espace,barre,espace étroits — stop : W N N
    if(cls[0]!=='N'||cls[1]!=='N'||cls[2]!=='N'||cls[3]!=='N') continue;
    if(cls[44]!=='W'||cls[45]!=='N'||cls[46]!=='N') continue;
    let digits = '', ok = true;
    for(let pair = 0; pair < 4; pair++){
      const base = 4 + pair*10;
      let bars = '', spaces = '';
      for(let i = 0; i < 5; i++){ bars += cls[base + 2*i]; spaces += cls[base + 2*i + 1]; }
      if(!(bars in ITF_PAT) || !(spaces in ITF_PAT)){ ok = false; break; }
      digits += ITF_PAT[bars] + ITF_PAT[spaces];
    }
    if(ok) return digits;
  }
  return null;
}

// Détecte les zones jaunes candidates (composantes connexes + filtre de forme)
function findYellowRegions(imgData){
  const d = imgData.data, w = imgData.width, h = imgData.height;
  const mask = new Uint8Array(w * h);
  for(let y = 0; y < h; y++){
    for(let x = 0; x < w; x++){
      const i = (y*w + x) * 4, r = d[i], g = d[i+1], b = d[i+2];
      if(r > 95 && g > 70 && b < r*0.72 && g > r*0.55 && r >= g - 10) mask[y*w + x] = 1;
    }
  }
  // étiquetage par parcours en largeur
  const labels = new Int32Array(w * h);
  const comps = [];
  const stack = new Int32Array(w * h);
  for(let start = 0; start < w*h; start++){
    if(!mask[start] || labels[start]) continue;
    const id = comps.length + 1;
    let sp = 0; stack[sp++] = start; labels[start] = id;
    let count = 0, sx = 0, sy = 0, sxx = 0, syy = 0, sxy = 0;
    while(sp > 0){
      const p = stack[--sp];
      const px = p % w, py = (p / w) | 0;
      count++; sx += px; sy += py; sxx += px*px; syy += py*py; sxy += px*py;
      // 4-voisinage
      if(px > 0   && mask[p-1] && !labels[p-1]){ labels[p-1] = id; stack[sp++] = p-1; }
      if(px < w-1 && mask[p+1] && !labels[p+1]){ labels[p+1] = id; stack[sp++] = p+1; }
      if(py > 0   && mask[p-w] && !labels[p-w]){ labels[p-w] = id; stack[sp++] = p-w; }
      if(py < h-1 && mask[p+w] && !labels[p+w]){ labels[p+w] = id; stack[sp++] = p+w; }
    }
    if(count < 150) continue;
    const mx = sx/count, my = sy/count;
    const cxx = sxx/count - mx*mx, cyy = syy/count - my*my, cxy = sxy/count - mx*my;
    const common = Math.sqrt(Math.max(0, ((cxx-cyy)/2)*((cxx-cyy)/2) + cxy*cxy));
    const l1 = (cxx+cyy)/2 + common, l2 = Math.max((cxx+cyy)/2 - common, 0.5);
    const aspect = Math.sqrt(l1 / l2);
    // une étiquette code-barres est un rectangle allongé (ratio ~3-4)
    if(aspect < 1.7 || aspect > 8) continue;
    comps.push({ count, cx: mx, cy: my,
                 angle: 0.5 * Math.atan2(2*cxy, cxx - cyy),
                 halfW: Math.sqrt(l1) * 1.95,
                 halfH: Math.sqrt(l2) * 2.3 });
  }
  comps.sort((a,b) => b.count - a.count);
  return comps.slice(0, 4);
}

// Pipeline complet : trouve l'étiquette dans un canvas, la redresse, décode
const fiaWork = document.createElement('canvas');
const fiaLabel = document.createElement('canvas');
function fiaDecodeFromCanvas(srcCanvas){
  const sw = srcCanvas.width, sh = srcCanvas.height;
  if(!sw || !sh) return null;
  // 1) détection jaune sur version réduite
  const detW = 420, scale = detW / sw;
  fiaWork.width = detW; fiaWork.height = Math.max(1, Math.round(sh * scale));
  const wctx = fiaWork.getContext('2d', { willReadFrequently: true });
  wctx.drawImage(srcCanvas, 0, 0, fiaWork.width, fiaWork.height);
  const regions = findYellowRegions(wctx.getImageData(0, 0, fiaWork.width, fiaWork.height));
  for(const reg of regions){
    const code = fiaDecodeRegion(srcCanvas, reg, scale);
    if(code) return code;
  }
  return null;
}

function fiaDecodeRegion(srcCanvas, reg, scale){
  const sw = srcCanvas.width, sh = srcCanvas.height;
  // 2) redressement à bonne résolution depuis la source
  const fcx = reg.cx/scale, fcy = reg.cy/scale;
  const HW = Math.min(reg.halfW/scale, sw), HH = Math.min(reg.halfH/scale, sh);
  if(HW < 40) return null; // étiquette trop petite / trop loin
  const outW = 900, outScale = outW / (2*HW*1.06);
  fiaLabel.width = outW;
  fiaLabel.height = Math.max(60, Math.min(500, Math.round(2*HH*1.15*outScale)));
  const lctx = fiaLabel.getContext('2d', { willReadFrequently: true });
  lctx.setTransform(1,0,0,1,0,0);
  lctx.fillStyle = '#808080';
  lctx.fillRect(0, 0, fiaLabel.width, fiaLabel.height);
  lctx.translate(fiaLabel.width/2, fiaLabel.height/2);
  lctx.rotate(-reg.angle);
  lctx.scale(outScale, outScale);
  lctx.drawImage(srcCanvas, -fcx, -fcy);
  // 3) niveaux de gris, plusieurs bandes moyennées verticalement, deux sens
  const img = lctx.getImageData(0, 0, fiaLabel.width, fiaLabel.height);
  const W = img.width, H = img.height, data = img.data;
  const gray = new Float32Array(W * H);
  for(let i = 0, j = 0; i < data.length; i += 4, j++)
    gray[j] = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
  const bands = [[0.12,0.55],[0.20,0.68],[0.30,0.78],[0.42,0.85],[0.15,0.42],[0.55,0.85]];
  const votes = {};
  for(const tb of bands){
    const y0 = Math.round(H*tb[0]), y1 = Math.max(y0+3, Math.round(H*tb[1]));
    const profile = new Float64Array(W);
    for(let x = 0; x < W; x++){
      let s = 0;
      for(let y = y0; y < y1; y++) s += gray[y*W + x];
      profile[x] = s / (y1 - y0);
    }
    const rev = Float64Array.from(profile).reverse();
    for(const p of [profile, rev]){
      const code = itfDecodeRuns(itfRunsFromProfile(p));
      if(code) votes[code] = (votes[code] || 0) + 1;
    }
  }
  let best = null, bestN = 0;
  for(const c in votes) if(votes[c] > bestN){ best = c; bestN = votes[c]; }
  return best;
}

// ---------- Scanner (caméra gérée en direct + décodage ZXing-C++ WebAssembly) ----------
const APP_VERSION = 'v8';
let detectionLocked = false;
let recentReads = [];
let scanStream = null;
let scanAbort = false;

function stopCamera(){
  scanAbort = true;
  if(scanStream){ try{ scanStream.getTracks().forEach(t=>t.stop()); }catch(e){} scanStream = null; }
  state.quaggaRunning = false;
}

function setScanStatus(msg){
  const p = document.querySelector('#hint p');
  if(p) p.textContent = msg;
}

async function startCamera(){
  detectionLocked = false;
  recentReads = [];
  scanAbort = false;
  const video = document.getElementById('scan-video');

  try{
    if(typeof ZXingWASM === 'undefined') throw new Error('librairie de scan non chargée (connexion ?)');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('caméra non disponible dans ce navigateur');

    // 1) Caméra pilotée directement
    scanStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = scanStream;
    await video.play();
    state.quaggaRunning = true;
    setupTorch();
    setScanStatus('Chargement du décodeur…');

    // 2) Boucle de scan : bande centrale de l'image → ZXing-C++ (WASM)
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let decoderReady = false;
    let errorShown = false;

    while(!scanAbort && !detectionLocked){
      if(video.videoWidth){
        const vw = video.videoWidth, vh = video.videoHeight;
        const cw = Math.round(vw * 0.96), ch = Math.round(vh * 0.72);
        const cx = Math.round((vw - cw) / 2), cy = Math.round((vh - ch) / 2);
        canvas.width = cw; canvas.height = ch;
        ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

        // A) Décodeur FIA spécialisé (moyenne verticale, résiste à l'usure)
        try{
          const fia = fiaDecodeFromCanvas(canvas);
          if(fia) handleDetected(fia);
        }catch(e){ console.warn('fia decoder', e); }

        // B) ZXing-C++ WASM en secours (autres codes / cas généraux)
        if(!detectionLocked) try{
          const results = await ZXingWASM.readBarcodes(
            ctx.getImageData(0, 0, cw, ch),
            { tryHarder: true, tryRotate: true, tryInvert: true, maxNumberOfSymbols: 1 }
          );
          if(!decoderReady){
            decoderReady = true;
            setScanStatus("Scanner actif — vise l'étiquette jaune, ou utilise 📷 Photo HD");
          }
          if(results && results.length && results[0].text){
            handleDetected(results[0].text);
          }
        }catch(e){
          console.error(e);
          if(!errorShown){
            errorShown = true;
            setScanStatus('Erreur décodeur : ' + (e && e.message ? e.message : e));
          }
        }
      }
      await new Promise(r => setTimeout(r, 120));
    }
  }catch(err){
    console.error(err);
    stopCamera();
    showCameraError("Scanner impossible à démarrer : " + (err && err.message ? err.message : err) + ". Tu peux saisir le code manuellement.");
  }
}

function handleDetected(code){
  if(detectionLocked || !code) return;

  // Verrouillage : codes FIA (8 chiffres) après 2 lectures identiques,
  // autres formats après 3 (anti fausse lecture)
  recentReads.push(code);
  if(recentReads.length > 6) recentReads.shift();
  const needed = /^\d{8}$/.test(code) ? 2 : 3;
  if(recentReads.filter(c => c === code).length < needed) return;

  detectionLocked = true;
  recentReads = [];
  playBeep();
  onBarcodeFound(code);
}

let torchOn = false;
function setupTorch(){
  torchOn = false;
  const btn = document.getElementById('torch-btn');
  const video = document.getElementById('scan-video');
  if(!btn || !video || !video.srcObject) return;
  try{
    const track = video.srcObject.getVideoTracks()[0];
    const caps = track && track.getCapabilities ? track.getCapabilities() : null;
    if(!caps || !caps.torch) return; // non supporté (souvent le cas sur iPhone)
    btn.style.display = 'inline-flex';
    btn.onclick = async () => {
      try{
        torchOn = !torchOn;
        await track.applyConstraints({ advanced: [{ torch: torchOn }] });
        btn.textContent = torchOn ? '🔦 Torche ON' : '🔦 Torche';
      }catch(e){ console.warn('torch failed', e); }
    };
  }catch(e){ /* ignore */ }
}

function photoHD(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = async () => {
    const file = inp.files && inp.files[0];
    if(!file) return;
    setScanStatus('Analyse de la photo…');
    try{
      let bmp;
      try{ bmp = await createImageBitmap(file, { imageOrientation: 'from-image' }); }
      catch(e){ bmp = await createImageBitmap(file); }
      // limiter à 2600px de large (suffisant, validé sur photos réelles)
      const maxW = 2600;
      const sc = Math.min(1, maxW / bmp.width);
      const pc = document.createElement('canvas');
      pc.width = Math.round(bmp.width * sc);
      pc.height = Math.round(bmp.height * sc);
      pc.getContext('2d').drawImage(bmp, 0, 0, pc.width, pc.height);

      // A) décodeur FIA spécialisé
      let code = null;
      try{ code = fiaDecodeFromCanvas(pc); }catch(e){ console.warn(e); }

      // B) secours : ZXing-C++ sur l'image entière
      if(!code && typeof ZXingWASM !== 'undefined'){
        try{
          const pctx = pc.getContext('2d');
          const results = await ZXingWASM.readBarcodes(
            pctx.getImageData(0, 0, pc.width, pc.height),
            { tryHarder: true, tryRotate: true, tryInvert: true, maxNumberOfSymbols: 1 }
          );
          if(results && results.length && results[0].text) code = results[0].text;
        }catch(e){ console.warn(e); }
      }

      if(code){
        detectionLocked = true;
        playBeep();
        onBarcodeFound(code);
      }else{
        setScanStatus("Photo illisible — rapproche-toi (étiquette bien à plat dans le cadre) et réessaie");
        showToast('Code non lu sur la photo');
      }
    }catch(e){
      console.error(e);
      setScanStatus('Erreur photo : ' + (e && e.message ? e.message : e));
    }
  };
  inp.click();
}

        <div class="stat"><b>${tire.sessions.length}</b><span>Roulages</span></div>
        <div class="stat"><b>${totalLaps}</b><span>Tours</span></div>
        <div class="stat"><b>${totalKm||'—'}</b><span>Km</span></div>
      </div>

      <button class="btn btn-primary" id="add-session" style="margin-bottom:22px;">＋ Ajouter un roulage</button>

      <div id="history"></div>
    </main>
  `;
  document.getElementById('det-back').onclick = () => go('home');
  document.getElementById('add-session').onclick = () => go('form', { tireKey: tire.key });
  document.getElementById('delete-tire').onclick = async () => {
    if(!confirm(`Supprimer définitivement le pneu ${tire.id} et tout son historique (${tire.sessions.length} roulage${tire.sessions.length>1?'s':''}) ? Cette action est irréversible.`)) return;
    await deleteTire(tire.key);
    showToast('Pneu supprimé');
    go('home');
  };

  const hist = document.getElementById('history');
  if(tire.sessions.length===0){
    hist.innerHTML = `<div class="empty"><p>Aucun roulage enregistré pour ce pneu.</p></div>`;
    return;
  }
  const ordered = [...tire.sessions].sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.id-a.id));
  hist.innerHTML = ordered.map((s, i)=>{
    const num = tire.sessions.length - i;
    const meta = [];
    if(s.laps) meta.push(`<div><b>${s.laps}</b> tours</div>`);
    if(s.km) meta.push(`<div><b>${s.km}</b> km</div>`);
    if(s.pressureCold || s.pressureHot) meta.push(`<div>Pression : <b>${s.pressureCold||'—'} → ${s.pressureHot||'—'} bar</b></div>`);
    if(s.temp) meta.push(`<div>Temp. pneu : <b>${s.temp}°C</b></div>`);
    const sInfo = posInfo(s.position);
    return `
      <div class="session" data-idx="${i}">
        <div class="s-num">ROULAGE #${num} — ${fmtDate(s.date)} <span class="s-chevron">▾</span></div>
        <div class="s-title">${escapeHtml(s.location) || 'Lieu non renseigné'} ${s.sessionType ? '· '+escapeHtml(s.sessionType) : ''}
          ${s.position ? `<span class="pos-badge" style="--pos-color:${sInfo.color};margin-left:6px;">${sInfo.label}</span>` : ''}
        </div>
        <div class="s-detail">
          <div class="s-grid">${meta.join('')}</div>
          ${s.setup ? `<div class="s-note"><b>Réglages :</b> ${escapeHtml(s.setup)}</div>` : ''}
          ${s.wear ? `<div class="s-note" style="margin-top:4px;"><b>Usure :</b> ${escapeHtml(s.wear)}</div>` : ''}
          ${!s.laps && !s.km && !s.pressureCold && !s.pressureHot && !s.temp && !s.setup && !s.wear ? `<div class="s-note">Aucun détail supplémentaire renseigné.</div>` : ''}
          <div class="s-actions">
            <button class="s-action-btn" data-action="edit" data-sid="${s.id}">Modifier</button>
            <button class="s-action-btn s-action-delete" data-action="delete" data-sid="${s.id}">Supprimer</button>
          </div>
        </div>
      </div>`;
  }).join('');
  hist.querySelectorAll('.session').forEach(el=>{
    el.querySelector('.s-num').onclick = () => el.classList.toggle('open');
    el.querySelector('.s-title').onclick = () => el.classList.toggle('open');
  });
  hist.querySelectorAll('[data-action="edit"]').forEach(btn=>{
    btn.onclick = (e) => {
      e.stopPropagation();
      go('form', { tireKey: tire.key, editSessionId: Number(btn.dataset.sid) });
    };
  });
  hist.querySelectorAll('[data-action="delete"]').forEach(btn=>{
    btn.onclick = async (e) => {
      e.stopPropagation();
      if(!confirm('Supprimer ce roulage ? Cette action est définitive.')) return;
      tire.sessions = tire.sessions.filter(x=>x.id !== Number(btn.dataset.sid));
      const ok = await saveTire(tire.key, tire);
      showToast(ok ? 'Roulage supprimé' : "Erreur de suppression");
      renderDetail(v);
    };
  });
}
// ---------- Form ----------
async function renderForm(v){
  const tire = await getTire(state.tireKey);
  if(!tire){ go('home'); return; }
  const editSessionId = state.editSessionId || null;
  state.editSessionId = null;
  const editingSession = editSessionId ? tire.sessions.find(x=>x.id===editSessionId) : null;

  const prefillSession = editingSession ? editingSession.sessionType : (state.prefillSession || '');
  const prefillLocation = editingSession ? editingSession.location : (state.prefillLocation || '');
  state.prefillSession = null;
  state.prefillLocation = null;

  const sessionOptions = SESSION_TYPES.includes(prefillSession) || !prefillSession
    ? SESSION_TYPES
    : [prefillSession, ...SESSION_TYPES];

  v.innerHTML = `
    <header>
      <div class="back" id="form-back">‹</div>
      <div>
        <h1>${editingSession ? 'Modifier le roulage' : 'Nouveau roulage'}</h1>
        <div class="sub">${escapeHtml(tire.id)}</div>
      </div>
    </header>
    <main class="form-sheet">
      <label>Date</label>
      <input type="date" id="f-date" value="${editingSession ? editingSession.date : todayStr()}">

      <label>Lieu / événement</label>
      <input type="text" id="f-loc" placeholder="Ex. Charade, La Chatre…" value="${escapeHtml(prefillLocation)}">

      <label>Type de session</label>
      <select id="f-type">
        ${sessionOptions.map(t=>`<option ${t===prefillSession?'selected':''}>${escapeHtml(t)}</option>`).join('')}
      </select>

      <div class="row2">
        <div>
          <label>Tours</label>
          <input type="number" id="f-laps" inputmode="numeric" placeholder="0" value="${editingSession && editingSession.laps ? editingSession.laps : ''}">
        </div>
        <div>
          <label>Distance (km)</label>
          <input type="number" id="f-km" inputmode="decimal" placeholder="0" value="${editingSession && editingSession.km ? editingSession.km : ''}">
        </div>
      </div>

      <div class="row2">
        <div>
          <label>Pression à froid (bar)</label>
          <input type="number" step="0.1" id="f-pcold" inputmode="decimal" placeholder="1.8" value="${editingSession && editingSession.pressureCold ? editingSession.pressureCold : ''}">
        </div>
        <div>
          <label>Pression à chaud (bar)</label>
          <input type="number" step="0.1" id="f-phot" inputmode="decimal" placeholder="2.1" value="${editingSession && editingSession.pressureHot ? editingSession.pressureHot : ''}">
        </div>
      </div>

      <label>Emplacement du pneu</label>
      <select id="f-position">
        <option value="">— Non renseigné —</option>
        ${POSITIONS.map(p=>`<option value="${p.id}" ${ (editingSession ? editingSession.position : tire.position)===p.id ? 'selected':''}>${escapeHtml(p.label)}</option>`).join('')}
      </select>

      <label>Réglages (carrossage, parallélisme…)</label>
      <textarea id="f-setup" placeholder="Ex. carrossage -2.5°, parallélisme +1mm">${editingSession ? escapeHtml(editingSession.setup||'') : ''}</textarea>

      <label>Notes d'usure</label>
      <textarea id="f-wear" placeholder="Ex. usure épaule extérieure, léger graining">${editingSession ? escapeHtml(editingSession.wear||'') : ''}</textarea>

      <div class="form-actions">
        <button class="btn btn-ghost" id="form-cancel">Annuler</button>
        <button class="btn btn-primary" id="form-save">Enregistrer</button>
      </div>
    </main>
  `;
  document.getElementById('form-back').onclick = () => go('detail', { tireKey: tire.key });
  document.getElementById('form-cancel').onclick = () => go('detail', { tireKey: tire.key });
  document.getElementById('form-save').onclick = async () => {
    const session = {
      id: editingSession ? editingSession.id : Date.now(),
      date: document.getElementById('f-date').value || todayStr(),
      location: document.getElementById('f-loc').value.trim(),
      sessionType: document.getElementById('f-type').value,
      position: document.getElementById('f-position').value || null,
      laps: document.getElementById('f-laps').value,
      km: document.getElementById('f-km').value,
      pressureCold: document.getElementById('f-pcold').value,
      pressureHot: document.getElementById('f-phot').value,
      setup: document.getElementById('f-setup').value.trim(),
      wear: document.getElementById('f-wear').value.trim(),
    };
    if(editingSession){
      const idx = tire.sessions.findIndex(x=>x.id===editingSession.id);
      if(idx>-1) tire.sessions[idx] = session;
    } else {
      tire.sessions.push(session);
    }
    const ok = await saveTire(tire.key, tire);
    showToast(ok ? (editingSession ? 'Roulage modifié' : 'Roulage enregistré') : "Erreur d'enregistrement");
    go('detail', { tireKey: tire.key });
  };
}

render();
</script>
</body>
